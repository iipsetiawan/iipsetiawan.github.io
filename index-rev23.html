<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FamilyFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* ── LIQUID GLASS iOS THEME ── */
:root {
  --bg-grad: linear-gradient(160deg, #ddeeff 0%, #e8f0ff 30%, #f0e8ff 65%, #fde8f5 100%);
  --glass: rgba(255,255,255,0.55);
  --glass-strong: rgba(255,255,255,0.72);
  --glass-border: rgba(255,255,255,0.85);
  --glass-border-subtle: rgba(255,255,255,0.5);
  --glass-shadow: 0 8px 32px rgba(100,120,200,0.12), 0 1.5px 6px rgba(100,120,200,0.08);
  --glass-shadow-lg: 0 16px 48px rgba(80,100,180,0.16), 0 4px 12px rgba(80,100,180,0.1);
  --glass-inset: inset 0 1px 0 rgba(255,255,255,0.9), inset 0 -1px 0 rgba(200,210,240,0.3);
  --blur: blur(20px) saturate(1.8);
  --blur-sm: blur(12px) saturate(1.6);
  --text: #1a1f3a;
  --text2: #5a6480;
  --text3: #9aa0b8;
  --accent: #4a7cf7;
  --accent2: #6c5fff;
  --green: #00b877;
  --green-bg: rgba(0,184,119,0.1);
  --red: #f03a5a;
  --red-bg: rgba(240,58,90,0.1);
  --amber: #f5a623;
  --amber-bg: rgba(245,166,35,0.1);
  --purple: #8b5cf6;
  --pink: #ec4899;
  --teal: #0ea5e9;
  --radius: 20px;
  --radius-sm: 14px;
  --radius-xs: 8px;
  --font: 'Nunito', sans-serif;
  --mono: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Monaco, 'Courier New', monospace;
  --nav-h: 72px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg-grad);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  overflow-x: hidden;
  position: relative;
}
/* Ambient blobs */
body::before, body::after {
  content: ''; position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
}
body::before {
  width: 340px; height: 340px; top: -80px; left: -80px;
  background: radial-gradient(circle, rgba(130,180,255,0.28) 0%, transparent 70%);
}
body::after {
  width: 280px; height: 280px; bottom: 80px; right: -60px;
  background: radial-gradient(circle, rgba(200,160,255,0.22) 0%, transparent 70%);
}
/* Scrollbar */
::-webkit-scrollbar { width: 0; }

/* ── GLASS MIXINS (via class) ── */
.glass {
  background: var(--glass);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow), var(--glass-inset);
}
.glass-strong {
  background: var(--glass-strong);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow-lg), var(--glass-inset);
}

/* ── HEADER ── */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.6);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--glass-border-subtle);
  height: 58px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px;
}
.logo {
  font-size: 20px; font-weight: 800; letter-spacing: -.3px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.icon-btn {
  width: 36px; height: 36px; border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2); font-size: 19px; transition: all .15s;
  background: rgba(255,255,255,0.5); border: 1px solid var(--glass-border-subtle);
}
.icon-btn:active { transform: scale(0.93); background: rgba(255,255,255,0.8); }
.header-btns { display: flex; gap: 8px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(255,255,255,0.65);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border-top: 1px solid var(--glass-border);
  height: calc(var(--nav-h) + var(--safe-bottom));
  display: flex; align-items: center; padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 2px; cursor: pointer; padding: 8px 4px;
  color: var(--text3); font-size: 10px; font-weight: 700;
  transition: color .15s;
}
.nav-item.active { color: var(--accent); }
.nav-item i { font-size: 23px; }
.nav-fab { flex: 0 0 68px; display: flex; align-items: center; justify-content: center; }
.fab {
  width: 54px; height: 54px; border-radius: 50%; cursor: pointer; border: none;
  background: linear-gradient(145deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 28px;
  box-shadow: 0 6px 24px rgba(74,124,247,0.4), 0 2px 6px rgba(74,124,247,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
  transition: transform .15s, box-shadow .15s;
}
.fab:active { transform: scale(0.91); box-shadow: 0 3px 12px rgba(74,124,247,0.3); }

/* ── PAGES ── */
.page { display: none; padding: 14px 14px calc(var(--nav-h) + 24px); position: relative; z-index: 1; }
.page.active { display: block; }
/* Swipe hint for acc-switcher */
.acc-switcher-wrap { position: relative; }
.acc-switcher-wrap::after {
  content: ''; position: absolute; right: 0; top: 0; bottom: 8px;
  width: 24px; pointer-events: none;
  background: linear-gradient(to right, transparent, rgba(240,245,255,0.6));
}

/* ── ACCOUNT TAB SWITCHER ── */
.acc-switcher { display: flex; gap: 7px; overflow-x: auto; padding: 10px 0 12px; scrollbar-width: none; }
.acc-switcher::-webkit-scrollbar { display: none; }
.acc-pill {
  flex-shrink: 0; padding: 7px 15px; border-radius: 99px; cursor: pointer;
  font-size: 13px; font-weight: 700; transition: all .18s; white-space: nowrap;
  background: rgba(255,255,255,0.5); border: 1px solid var(--glass-border-subtle);
  color: var(--text2); display: flex; align-items: center; gap: 5px;
}
.acc-pill.active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-color: transparent; color: #fff;
  box-shadow: 0 4px 16px rgba(74,124,247,0.35);
}

/* ── BALANCE HERO CARD ── */
.balance-card {
  border-radius: 24px; padding: 22px 20px; margin-bottom: 14px;
  background: linear-gradient(145deg, rgba(255,255,255,0.7), rgba(235,245,255,0.5));
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow-lg), var(--glass-inset);
  position: relative; overflow: hidden;
}
.balance-card::before {
  content: ''; position: absolute; top: -50px; right: -50px;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(100,150,255,0.15) 0%, transparent 65%);
  pointer-events: none;
}
.bal-label { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; }
.bal-amount { font-size: 36px; font-weight: 800; font-family: var(--mono); color: var(--text); line-height: 1.1; margin-bottom: 6px; }
.bal-amount.neg { color: var(--red); }
.bal-period { font-size: 12px; color: var(--text2); margin-bottom: 14px; }
.bal-period .pos { color: var(--green); font-weight: 700; }
.bal-period .neg2 { color: var(--red); font-weight: 700; }
.bal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.bal-stat {
  border-radius: 14px; padding: 11px 12px;
  background: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.8);
  display: flex; align-items: center; gap: 9px;
}
.bs-ic { width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.bs-inc .bs-ic { background: var(--green-bg); color: var(--green); }
.bs-exp .bs-ic { background: var(--red-bg); color: var(--red); }
.bs-lbl { font-size: 10px; font-weight: 700; color: var(--text3); }
.bs-val { font-size: 14px; font-weight: 800; font-family: var(--mono); color: var(--text); }

/* ── WALLET CHIPS ── */
.wallet-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; }
.wallet-row::-webkit-scrollbar { display: none; }
.wallet-chip {
  flex-shrink: 0; border-radius: 14px; padding: 10px 14px; cursor: pointer;
  background: rgba(255,255,255,0.55); border: 1px solid var(--glass-border-subtle);
  transition: all .15s; min-width: 120px;
}
.wallet-chip.active {
  background: rgba(255,255,255,0.85); border-color: var(--glass-border);
  box-shadow: 0 4px 16px rgba(100,120,200,0.15);
}
.wc-name { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 2px; }
.wc-bal { font-size: 15px; font-weight: 800; font-family: var(--mono); color: var(--text); }
.add-wallet-chip {
  flex-shrink: 0; border-radius: 14px; padding: 10px 14px; cursor: pointer;
  background: rgba(74,124,247,0.08); border: 1.5px dashed rgba(74,124,247,0.35);
  display: flex; align-items: center; gap: 6px; color: var(--accent); font-size: 12px; font-weight: 700;
  transition: all .15s; white-space: nowrap;
}
.add-wallet-chip:active { background: rgba(74,124,247,0.15); }

/* ── SECTION ── */
.section { margin-bottom: 18px; }
.sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.sec-title { font-size: 15px; font-weight: 800; color: var(--text); }
.show-more { font-size: 12px; font-weight: 700; color: var(--accent); cursor: pointer; background: none; border: none; display: flex; align-items: center; gap: 3px; }

/* ── GLASS CARD ── */
.g-card {
  border-radius: var(--radius); padding: 16px;
  background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow), var(--glass-inset);
}
.chart-wrap { position: relative; height: 190px; }
.chart-wrap-sm { position: relative; height: 160px; }

/* ── CATEGORY LIST ── */
.cat-list { display: flex; flex-direction: column; gap: 7px; }
.cat-item { display: flex; align-items: center; gap: 8px; }
.cat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.cat-name { font-size: 12px; font-weight: 600; color: var(--text2); flex: 1; }
.cat-bar-wrap { flex: 2; height: 5px; background: rgba(0,0,0,0.06); border-radius: 99px; overflow: hidden; }
.cat-bar { height: 100%; border-radius: 99px; }
.cat-amt { font-size: 12px; font-family: var(--mono); font-weight: 500; color: var(--text); min-width: 72px; text-align: right; }

/* ── TX LIST ── */
.tx-list { display: flex; flex-direction: column; gap: 10px; }
.tx-item {
  border-radius: var(--radius-sm); padding: 14px 15px;
  background: var(--glass-strong); backdrop-filter: var(--blur-sm); -webkit-backdrop-filter: var(--blur-sm);
  border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow), var(--glass-inset);
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  transition: transform .12s, box-shadow .12s;
}
.tx-item:active { transform: scale(0.98); }
.tx-icon {
  width: 44px; height: 44px; border-radius: 13px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.tx-info { flex: 1; min-width: 0; }
.tx-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-sub { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 3px; }
.tx-time { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: var(--text3); font-family: var(--mono); font-weight: 500; }
.badge {
  font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 99px;
  background: rgba(74,124,247,0.1); color: var(--accent);
  border: 1px solid rgba(74,124,247,0.2);
}
.badge-green { background: rgba(0,184,119,0.1); color: var(--green); border-color: rgba(0,184,119,0.2); }
.badge-purple { background: rgba(139,92,246,0.1); color: var(--purple); border-color: rgba(139,92,246,0.2); }
.tx-amt { font-size: 15px; font-weight: 800; font-family: var(--mono); white-space: nowrap; }
.tx-amt.inc { color: var(--green); }
.tx-amt.exp { color: var(--red); }
.tx-amt.trf { color: var(--purple); }

/* ── BUDGET ── */
.budget-item {
  border-radius: var(--radius-sm); padding: 14px;
  background: var(--glass); backdrop-filter: var(--blur-sm); -webkit-backdrop-filter: var(--blur-sm);
  border: 1px solid var(--glass-border); margin-bottom: 9px;
}
.bud-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.bud-name { font-size: 13px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
.bud-info { text-align: right; }
.bud-spent { font-size: 13px; font-weight: 700; color: var(--text); }
.bud-limit { font-size: 11px; color: var(--text3); }
.bud-track { height: 7px; background: rgba(0,0,0,0.07); border-radius: 99px; overflow: hidden; }
.bud-fill { height: 100%; border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.bud-footer { display: flex; justify-content: space-between; margin-top: 6px; }
.bud-remain { font-size: 11px; font-weight: 600; }
.bud-pct { font-size: 11px; color: var(--text3); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(20,30,60,0.35);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  width: 100%; max-width: 430px; max-height: 92vh; overflow-y: auto;
  background: rgba(240,245,255,0.92);
  backdrop-filter: blur(28px) saturate(2); -webkit-backdrop-filter: blur(28px) saturate(2);
  border: 1px solid var(--glass-border);
  border-radius: 28px 28px 0 0;
  padding: 20px 18px calc(28px + var(--safe-bottom));
  animation: sheetUp .28s cubic-bezier(.32,0,.67,0) forwards;
  box-shadow: 0 -8px 40px rgba(80,100,200,0.15);
}
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 38px; height: 4px; background: rgba(0,0,0,0.15); border-radius: 99px; margin: 0 auto 18px; display: block; }
.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 18px; color: var(--text); }
.modal-subtitle { font-size: 13px; color: var(--text2); margin-top: -14px; margin-bottom: 18px; }

/* ── FORMS ── */
.fg { margin-bottom: 14px; }
.fl { font-size: 11px; font-weight: 800; color: var(--text2); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 7px; display: block; }
.fi, .fs, .fta {
  width: 100%; padding: 13px 14px;
  background: rgba(255,255,255,0.7); border: 1px solid rgba(200,210,240,0.6);
  border-radius: var(--radius-sm); color: var(--text); font-family: var(--font); font-size: 14px; font-weight: 600;
  outline: none; transition: border-color .15s, background .15s;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  -webkit-appearance: none; appearance: none;
}
.fi:focus, .fs:focus, .fta:focus { border-color: var(--accent); background: rgba(255,255,255,0.9); }
.fs option { background: #f0f5ff; color: var(--text); }
.fta { min-height: 72px; resize: none; }
.type-tgl { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; margin-bottom: 14px; }
.type-btn {
  padding: 11px 6px; border-radius: var(--radius-sm); border: 1.5px solid rgba(200,210,240,0.6);
  cursor: pointer; font-size: 12px; font-weight: 700; font-family: var(--font);
  background: rgba(255,255,255,0.55); color: var(--text2);
  transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 5px;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  position: relative; flex-direction: column; padding: 10px 6px 8px;
}
.type-btn .type-label { display: flex; align-items: center; gap: 5px; }
.type-btn .type-check {
  width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid currentColor;
  display: flex; align-items: center; justify-content: center; font-size: 9px;
  opacity: 0; transition: opacity .15s; margin-top: 4px;
}
.type-btn.t-exp { background: var(--red-bg); border-color: var(--red); color: var(--red); box-shadow: 0 3px 10px rgba(240,58,90,0.2), inset 0 1px 0 rgba(255,255,255,0.6); }
.type-btn.t-exp .type-check { opacity: 1; background: var(--red); color: #fff; border-color: var(--red); }
.type-btn.t-inc { background: var(--green-bg); border-color: var(--green); color: var(--green); box-shadow: 0 3px 10px rgba(0,184,119,0.2), inset 0 1px 0 rgba(255,255,255,0.6); }
.type-btn.t-inc .type-check { opacity: 1; background: var(--green); color: #fff; border-color: var(--green); }
.type-btn.t-trf { background: rgba(139,92,246,0.1); border-color: var(--purple); color: var(--purple); box-shadow: 0 3px 10px rgba(139,92,246,0.2), inset 0 1px 0 rgba(255,255,255,0.6); }
.type-btn.t-trf .type-check { opacity: 1; background: var(--purple); color: #fff; border-color: var(--purple); }
.submit-btn {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: var(--radius-sm); color: #fff;
  font-family: var(--font); font-size: 15px; font-weight: 800;
  cursor: pointer; transition: opacity .15s, transform .1s;
  box-shadow: 0 6px 20px rgba(74,124,247,0.35);
}
.submit-btn:active { transform: scale(0.98); opacity: .9; }
.danger-btn {
  width: 100%; padding: 13px; border-radius: var(--radius-sm);
  background: var(--red-bg); border: 1px solid rgba(240,58,90,0.25);
  color: var(--red); font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer;
}

/* ── CATEGORY GRID ── */
.cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
.cgi {
  border-radius: 12px; padding: 9px 4px; cursor: pointer; text-align: center;
  background: rgba(255,255,255,0.6); border: 1.5px solid transparent;
  transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.cgi.sel { background: rgba(74,124,247,0.1); border-color: var(--accent); }
.cgi i { font-size: 20px; }
.cgi span { font-size: 9px; font-weight: 700; color: var(--text2); line-height: 1.2; }
.cgi.sel span { color: var(--accent); }

/* ── DETAIL ── */
.detail-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 0; border-bottom: 1px solid rgba(0,0,0,0.06);
}
.detail-row:last-child { border-bottom: none; }
.dk { font-size: 13px; color: var(--text2); font-weight: 600; }
.dv { font-size: 13px; font-weight: 700; color: var(--text); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + 14px + var(--safe-bottom));
  left: 50%; transform: translateX(-50%);
  background: rgba(30,40,80,0.85); backdrop-filter: var(--blur);
  color: #fff; padding: 10px 20px; border-radius: 99px;
  font-size: 13px; font-weight: 700; z-index: 300; display: none;
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 4px 20px rgba(20,30,80,0.2);
  white-space: nowrap;
}
.toast.show { display: block; animation: toastIn .2s ease; }
@keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

/* ── LOADING ── */
.loading { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 13px; font-weight: 600; }
.spinner { width: 26px; height: 26px; border: 2.5px solid rgba(74,124,247,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin .65s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── EMPTY ── */
.empty { text-align: center; padding: 30px 20px; color: var(--text3); }
.empty i { font-size: 38px; margin-bottom: 8px; display: block; }
.empty p { font-size: 13px; font-weight: 600; }

/* ── MISC ── */

<script>
// ═══════════════════════════════════════════════
//  DATA LAYER
// ═══════════════════════════════════════════════
// ── KONFIGURASI ─────────────────────────────────────────────────────────────
// CSV_URL: URL publish Google Sheets sheet "transactions"
// Cara dapat URL yang benar:
//   1. Buka spreadsheet → File → Share → Publish to web
//   2. Pilih sheet "transactions" (bukan "Entire document")
//   3. Pilih format "Comma-separated values (.csv)"
//   4. Klik Publish → copy URL
// URL yang benar akan mengandung parameter seperti: &gid=XXXXXXXXX&single=true
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9ncVQ9g8MUwB97j1-GTwcNi8bLg3uVp0J-Z5SivdemMSWLv4tZgCMjJTwbc9CXoviPD4oHhlg-K8A/pub?gid=591978419&single=true&output=csv';
// ⚠️  Ganti gid=0 dengan GID sheet "transactions" kamu
// Cara cek GID: klik tab sheet "transactions" di Sheets, lihat URL browser
// contoh: ...#gid=1234567890 → gid yang dipakai adalah 1234567890

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxL2IrX56eDHTEX6EoLyrJZeVHD322UYzcTI5HuNaCaNoPIUvus5baLSfhD8tj7_P86/exec';

const ACCOUNTS = [
  { id:'suami', label:'Suami', color:'#4a7cf7', initials:'S' },
  { id:'istri', label:'Istri', color:'#ec4899', initials:'I' }
];

const CATEGORIES = [
  { id:'food',          label:'Food & Drinks',    icon:'ti-tools-kitchen-2', color:'#f03a5a' },
  { id:'shopping',      label:'Shopping',          icon:'ti-shopping-bag',    color:'#f5a623' },
  { id:'housing',       label:'Housing',           icon:'ti-home-2',          color:'#4a7cf7' },
  { id:'transport',     label:'Transport',         icon:'ti-bus',             color:'#0ea5e9' },
  { id:'vehicle',       label:'Kendaraan',         icon:'ti-car',             color:'#6c5fff' },
  { id:'entertainment', label:'Hiburan',           icon:'ti-device-tv',       color:'#ec4899' },
  { id:'comm',          label:'Komunikasi',        icon:'ti-device-mobile',   color:'#00b877' },
  { id:'financial',     label:'Keuangan',          icon:'ti-credit-card',     color:'#8b5cf6' },
  { id:'health',        label:'Kesehatan',         icon:'ti-heartbeat',       color:'#f03a5a' },
  { id:'investment',    label:'Investasi',         icon:'ti-chart-line',      color:'#10b981' },
  { id:'income',        label:'Pemasukan',         icon:'ti-cash',            color:'#00b877' },
  { id:'other',         label:'Lainnya',           icon:'ti-dots',            color:'#9aa0b8' }
];

const WALLET_COLORS = ['#4a7cf7','#ec4899','#00b877','#f5a623','#8b5cf6','#0ea5e9','#f03a5a','#10b981'];

// State
let S = {
  transactions: [],
  wallets: {},       // { [accId]: [{id, name, balance, color}] }
  budgets: {},
  plans: [],          // [{id, name, target, icon, color, createdAt}]
  currentAcc: 'all',
  page: 'home',
  txType: 'expense',
  selCat: 'food',
  selWalletColor: WALLET_COLORS[0],
  charts: {},
  recFilter: 'all',
  recTime: 'all',
  editId: null
};

// ─── Storage ───
function load() {
  try {
    const t = localStorage.getItem('ff_tx'); if(t) S.transactions = JSON.parse(t);
    const w = localStorage.getItem('ff_wallets'); if(w) S.wallets = JSON.parse(w);
    const b = localStorage.getItem('ff_budgets'); if(b) S.budgets = JSON.parse(b);
    const p = localStorage.getItem('ff_plans'); if(p) S.plans = JSON.parse(p);
  } catch(e) {}
  if(!S.budgets || !Object.keys(S.budgets).length) defaultBudgets();
  if(!S.wallets || !Object.keys(S.wallets).length) defaultWallets();
}
function save() {
  localStorage.setItem('ff_tx', JSON.stringify(S.transactions));
  localStorage.setItem('ff_wallets', JSON.stringify(S.wallets));
  localStorage.setItem('ff_budgets', JSON.stringify(S.budgets));
  localStorage.setItem('ff_plans', JSON.stringify(S.plans));
}
function defaultBudgets() {
  S.budgets = {};
}
function defaultWallets() {
  S.wallets = { suami: [], istri: [] };
}

// ─── Helpers ───
function uid() { return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }
// Tanggal lokal YYYY-MM-DD (hindari shift UTC dari toISOString)
function localDateStr(d) { d=d||new Date(); const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
function getWallets(accId) { return S.wallets[accId] || []; }
function allWallets() { return [...getWallets('suami'), ...getWallets('istri')]; }
function findWallet(id) { return allWallets().find(w=>w.id===id); }
function walletBalance(wId) {
  const base = (findWallet(wId)||{}).balance || 0;
  return S.transactions.reduce((s,t) => {
    if(t.type==='income'  && t.wallet===wId) return s + t.amount;
    if(t.type==='expense' && t.wallet===wId) return s - t.amount;
    if(t.type==='plan_contribution' && t.wallet===wId) return s - t.amount;
    if(t.type==='transfer') {
      // fromWallet / wallet = sumber (keluar)
      const isFrom = t.fromWallet===wId || (!t.fromWallet && t.wallet===wId);
      // toWallet = tujuan (masuk)
      const isTo   = t.toWallet===wId;
      if(isFrom && !isTo) return s - t.amount;
      if(isTo   && !isFrom) return s + t.amount;
      // same wallet transfer (edge case): net 0
    }
    return s;
  }, base);
}
function accBalance(accId) {
  // Hitung saldo dompet yang terdaftar
  const registeredBal = getWallets(accId).reduce((s,w) => s + walletBalance(w.id), 0);
  // Tambahkan transaksi yang wallet-nya tidak match ke dompet manapun
  // (bisa terjadi saat data dari Sheets belum sinkron dengan config dompet)
  const registeredIds = new Set(allWallets().map(w => w.id));
  const unmatchedBal = S.transactions.reduce((s,t) => {
    if(t.account !== accId) return s;
    if(t.wallet && registeredIds.has(t.wallet)) return s; // sudah dihitung di atas
    if(t.type==='transfer') return s; // transfer sudah dihitung via walletBalance
    if(t.type==='plan_contribution') return s - t.amount;
    if(t.type==='income')  return s + t.amount;
    if(t.type==='expense') return s - t.amount;
    return s;
  }, 0);
  return registeredBal + unmatchedBal;
}
function allBalance() { return ACCOUNTS.reduce((s,a) => s + accBalance(a.id), 0); }
function getFiltered(acc) {
  const a = acc !== undefined ? acc : S.currentAcc;
  if(a === 'all') return S.transactions;
  const wids = getWallets(a).map(w=>w.id);
  return S.transactions.filter(t =>
    t.account === a || t.toAccount === a ||
    wids.includes(t.wallet) || wids.includes(t.fromWallet) || wids.includes(t.toWallet)
  );
}
function monthTx(txs) {
  const n = new Date(); return txs.filter(t => { const d=new Date(t.date); return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); });
}
function last30(txs) { const c=new Date(); c.setDate(c.getDate()-30); return txs.filter(t=>new Date(t.date)>=c); }
function calcInc(txs) { return txs.reduce((s,t)=>t.type==='income'?s+t.amount:s, 0); }
function calcExp(txs) { return txs.reduce((s,t)=>t.type==='expense'?s+t.amount:s, 0); }
function catExp(txs) { const m={}; txs.filter(t=>t.type==='expense').forEach(t=>{m[t.category]=(m[t.category]||0)+t.amount;}); return m; }
function getCat(id) { return CATEGORIES.find(c=>c.id===id)||CATEGORIES[CATEGORIES.length-1]; }
function getAcc(id) { return ACCOUNTS.find(a=>a.id===id)||ACCOUNTS[0]; }
// ─── Rencana Keuangan (Financial Plans) ───
function planSaved(planId) {
  return S.transactions.reduce((s,t)=> t.type==='plan_contribution' && t.planId===planId ? s+t.amount : s, 0);
}
function planProgress(plan) {
  if(!plan.target || plan.target<=0) return 0;
  return Math.min(100, (planSaved(plan.id)/plan.target)*100);
}
function findPlan(id) { return S.plans.find(p=>p.id===id); }
function fmt(n) {
  n = Math.abs(n);
  if(n>=1e9) return 'Rp'+(n/1e9).toFixed(1)+'M';
  if(n>=1e6) return 'Rp'+(n/1e6).toFixed(1)+'jt';
  if(n>=1e3) {
    let val = n/1e3;
    let str = (Math.round(val*10)/10).toString();
    if(str.includes('.')) str = str.replace(/0$/, '').replace(/\.$/, '');
    return 'Rp'+str+'rb';
  }
  return 'Rp'+Math.round(n).toLocaleString('id-ID');
}
function fmtFull(n) { return 'Rp '+Math.abs(Math.round(n)).toLocaleString('id-ID'); }
function fmtDate(d) { return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }

// Format tanggal lengkap + waktu: "08 Jun 2026 · 11:26"
function fmtDateTime(ts) {
  if(!ts) return null;
  const d = new Date(ts);
  if(isNaN(d)) return null;
  // Konversi ke WIB (UTC+7)
  const wib = new Date(d.getTime() + 7*60*60*1000);
  const dd   = String(wib.getUTCDate()).padStart(2,'0');
  const mon  = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'][wib.getUTCMonth()];
  const yyyy = wib.getUTCFullYear();
  const hh   = String(wib.getUTCHours()).padStart(2,'0');
  const mm   = String(wib.getUTCMinutes()).padStart(2,'0');
  return `${dd} ${mon} ${yyyy} · ${hh}:${mm}`;
}

// Format waktu saja: "11:26 WIB"
function fmtTime(ts) {
  if(!ts) return null;
  const d = new Date(ts);
  if(isNaN(d)) return null;
  const wib = new Date(d.getTime() + 7*60*60*1000);
  const hh  = String(wib.getUTCHours()).padStart(2,'0');
  const mm  = String(wib.getUTCMinutes()).padStart(2,'0');
  return `${hh}:${mm} WIB`;
}

// ─── Rupiah Input Formatter ───
// Mengubah input angka menjadi format 1.000.000 saat mengetik
function rupiahMask(el) {
  const raw = el.value.replace(/\D/g,'');
  if(!raw){ el.value=''; el.dataset.raw='0'; return; }
  el.dataset.raw = raw;
  el.value = parseInt(raw,10).toLocaleString('id-ID');
}
function rupiahVal(el) {
  return parseFloat((el.dataset.raw||el.value).replace(/\D/g,''))||0;
}
function initRupiahInput(id) {
  const el = document.getElementById(id);
  if(!el) return;
  el.type = 'text';
  el.inputMode = 'numeric';
  el.addEventListener('input', ()=>rupiahMask(el));
  el.addEventListener('focus', ()=>{ el.select(); });
}
function setRupiahInput(id, val) {
  const el = document.getElementById(id);
  if(!el) return;
  el.dataset.raw = val||'0';
  el.value = val ? parseInt(val,10).toLocaleString('id-ID') : '';
}

// ─── Sync wallets & budgets ke/dari Apps Script ───
async function pushConfig() {
  // Kirim konfigurasi dompet dan budget ke Sheets via Apps Script
  if(!APPS_SCRIPT_URL) return;
  // Hitung saldo aktual setiap dompet agar Sheets selalu sinkron
  const walletBalances = {};
  allWallets().forEach(w => { walletBalances[w.id] = walletBalance(w.id); });
  try {
    await fetch(APPS_SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'saveConfig', wallets: S.wallets, budgets: S.budgets, walletBalances })
    });
  } catch(e){}
}

async function pullConfig() {
  // Tarik konfigurasi dompet dan budget dari Apps Script
  if(!APPS_SCRIPT_URL) return false;
  const proxies = [
    `${APPS_SCRIPT_URL}?action=getConfig`,
    `https://corsproxy.io/?${encodeURIComponent(APPS_SCRIPT_URL+'?action=getConfig')}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(APPS_SCRIPT_URL+'?action=getConfig')}`,
  ];
  for(const url of proxies){
    try {
      const res = await fetch(url, {signal:AbortSignal.timeout(5000)});
      if(!res.ok) continue;
      const data = await res.json();
      if(data && data.wallets) {
        S.wallets = data.wallets;
        if(data.budgets) S.budgets = data.budgets;
        // Jika server mengembalikan walletBalances, update saldo base dompet
        // agar saldo dari perangkat lain ikut terbawa
        if(data.walletBalances) {
          Object.values(S.wallets).flat().forEach(w => {
            if(data.walletBalances[w.id] !== undefined) {
              // Recalculate: saldo base = walletBalances_remote - efek transaksi lokal
              const localEffect = S.transactions.reduce((s,t) => {
                if(t.source !== 'local') return s;
                if(t.type==='income' && t.wallet===w.id) return s + t.amount;
                if(t.type==='expense' && t.wallet===w.id) return s - t.amount;
                if(t.type==='transfer' && t.fromWallet===w.id) return s - t.amount;
                if(t.type==='transfer' && t.toWallet===w.id) return s + t.amount;
                return s;
              }, 0);
              w.balance = data.walletBalances[w.id] - localEffect;
            }
          });
        }
        save();
        return true;
      }
    } catch(e){}
  }
  return false;
}

// ─── CSV Loading ───
function parseCSVLine(l) {
  const r=[]; let c='',q=false;
  for(const ch of l){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}
  r.push(c); return r;
}

async function fetchWithProxy(url) {
  const targets = [
    url,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  ];
  for(const t of targets){
    try {
      const res = await fetch(t, {signal: AbortSignal.timeout(7000)});
      if(res.ok){
        const txt = await res.text();
        if(txt && txt.length > 10) return txt;
      }
    } catch(e){}
  }
  return null;
}

async function loadCSV() {
  toast('Menyinkronkan data...');

  // ── LANGKAH 1: Ambil config dulu (wallets & budgets) ──────────────────
  // Jalankan paralel: pullConfig via Apps Script JSON + CSV transactions
  // supaya tidak blocking satu sama lain
  const [configOk, txt] = await Promise.all([
    pullConfig(),
    fetchWithProxy(CSV_URL)
  ]);

  if(configOk) {
    // Config berhasil, render dulu agar wallets tampil
    renderAll();
  }

  if(!txt) {
    toast('⚠ Gagal baca Sheets — pastikan sudah di-publish & URL benar');
    renderAll();
    return;
  }

  // ── LANGKAH 2: Parse CSV ───────────────────────────────────────────────
  try {
    const lines = txt.trim().split('\n');
    if(lines.length < 2) { toast('Sheet transactions masih kosong'); renderAll(); return; }

    // Normalisasi header: hapus BOM, quotes, whitespace
    const hdrs = lines[0].replace(/^\uFEFF/, '').split(',')
      .map(h => h.trim().toLowerCase().replace(/"/g,'').replace(/\r/g,''));

    const get = (o,...keys) => {
      for(const k of keys) if(o[k] !== undefined && o[k] !== '') return o[k];
      return '';
    };

    const rows = lines.slice(1).map(l => {
      const v = parseCSVLine(l);
      const o = {};
      hdrs.forEach((h,i) => o[h] = (v[i]||'').trim().replace(/"/g,'').replace(/\r/g,''));
      return o;
    }).filter(r => r && get(r,'amount') !== '');  // buang baris kosong

    // ── DEBUG: log header & baris pertama ke console ──
    console.log('[FamilyFlow] CSV headers:', hdrs);
    if(rows.length) console.log('[FamilyFlow] CSV row[0]:', rows[0]);

    const csvTx = rows.map(r => {
      // Amount
      const amtRaw = get(r,'amount','jumlah','nominal');
      const amt = parseFloat(String(amtRaw).replace(/[^0-9.-]/g,'')) || 0;
      if(!amt) return null;

      // Type
      const typeRaw = get(r,'type','tipe','jenis').toLowerCase();
      const catRaw  = get(r,'category','kategori','cat').toLowerCase();
      let type = 'expense';
      if(typeRaw==='income' || typeRaw==='masuk' || catRaw==='income') type='income';
      if(typeRaw==='transfer') type='transfer';

      // Category
      let cat = 'other';
      const cm = {
        food:'food', makan:'food', drink:'food',
        shopping:'shopping', belanja:'shopping',
        housing:'housing', rumah:'housing',
        transport:'transport',
        kendaraan:'vehicle', vehicle:'vehicle',
        entertainment:'entertainment', hiburan:'entertainment',
        comm:'comm', komunikasi:'comm',
        financial:'financial', keuangan:'financial',
        health:'health', kesehatan:'health', medis:'health', dokter:'health', obat:'health',
        investment:'investment', investasi:'investment',
        income:'income', pemasukan:'income'
      };
      for(const[k,v2] of Object.entries(cm)) if(catRaw.includes(k)){cat=v2;break;}

      // Account
      const accRaw = get(r,'account','akun').toLowerCase();
      const acc = accRaw.includes('istri') ? 'istri' : 'suami';

      // ── Wallet matching ────────────────────────────────────────────────
      // Kolom wallet di Sheets berisi wallet_id (contoh: w_id_17807637xxx)
      // Strategi: simpan raw wallet_id dari Sheets apa adanya.
      // walletBalance() sudah bisa hitung berdasarkan wallet id.
      const walletRaw     = get(r,'wallet','dompet').trim();
      const toWalletRaw   = get(r,'toWallet','towallet','to_wallet','ke_dompet').trim();
      const toAccRaw      = get(r,'toAccount','toaccount','to_account','ke_akun').toLowerCase().trim();
      const walletNameRaw = get(r,'walletname','wallet_name','namadomet','from_wallet_name').trim();
      const toWalletNameRaw = get(r,'towalletname','towallet_name','to_wallet_name').trim();

      const ws = getWallets(acc);
      const allW = allWallets();
      let wallet = walletRaw;
      if(ws.length && walletRaw) {
        const byId   = ws.find(w => w.id === walletRaw);
        const byName = ws.find(w => w.name.toLowerCase() === walletRaw.toLowerCase());
        if(byId)   wallet = byId.id;
        else if(byName) wallet = byName.id;
      }
      // Fallback: jika wallet masih kosong (transfer dari Sheets yg hanya simpan walletName),
      // cari berdasarkan walletName
      if(!wallet && walletNameRaw) {
        const byName = allW.find(w => w.name.toLowerCase() === walletNameRaw.toLowerCase());
        if(byName) wallet = byName.id;
      }

      // Resolve toWallet (bisa lintas akun, cari di semua dompet)
      let toWallet = toWalletRaw;
      if(toWalletRaw) {
        const twById   = allW.find(w => w.id === toWalletRaw);
        const twByName = allW.find(w => w.name.toLowerCase() === toWalletRaw.toLowerCase());
        if(twById)   toWallet = twById.id;
        else if(twByName) toWallet = twByName.id;
      }
      // Fallback: cari toWallet berdasarkan toWalletName
      if(!toWallet && toWalletNameRaw) {
        const byName = allW.find(w => w.name.toLowerCase() === toWalletNameRaw.toLowerCase());
        if(byName) toWallet = byName.id;
      }

      // Resolve toAccount
      let toAccount = '';
      if(toAccRaw) {
        toAccount = toAccRaw.includes('istri') ? 'istri' : 'suami';
      } else if(toWallet) {
        // Coba deteksi dari wallet tujuan
        const twInfo = allWallets().find(w => w.id === toWallet);
        if(twInfo) {
          // Cari di S.wallets untuk tahu akun pemiliknya
          for(const [aId, wList] of Object.entries(S.wallets||{})) {
            if((wList||[]).some(w => w.id === toWallet)) { toAccount = aId; break; }
          }
        }
      }

      // Date
      const dateStr = get(r,'date','tanggal');
      let date = new Date();
      if(dateStr) {
        const pts = String(dateStr).split(/[\/\-\.]/);
        if(pts.length === 3) {
          const parsed = pts[0].length === 4
            ? new Date(`${pts[0]}-${pts[1].padStart(2,'0')}-${pts[2].padStart(2,'0')}`)
            : new Date(`${pts[2]}-${pts[1].padStart(2,'0')}-${pts[0].padStart(2,'0')}`);
          if(!isNaN(parsed)) date = parsed;
        }
      }

      // ID: kolom id → timestamp → fingerprint
      const rawId = get(r,'id');
      const rawTs = get(r,'timestamp');
      const sheetId = rawId
        || (rawTs ? 'ts_'+String(rawTs).replace(/[^0-9TZ]/g,'') : '')
        || ('fp_'+String(dateStr)+'_'+amt+'_'+type+'_'+String(get(r,'note','keterangan','catatan')));

      // Parse timestamp ISO dari Sheets (contoh: 2026-06-08T11:26:15.913Z)
      let parsedTs = null;
      if(rawTs) {
        const d = new Date(rawTs);
        if(!isNaN(d)) parsedTs = d.toISOString();
      }

      // Untuk transfer: fromWallet = wallet (sumber), toWallet = tujuan
      const fromWalletVal = (type === 'transfer') ? wallet : undefined;

      const txObj = {
        id: sheetId,
        date: localDateStr(date),
        timestamp: parsedTs,
        amount: amt, type, category: cat, account: acc, wallet,
        note: get(r,'note','keterangan','catatan','desc') || cat,
        source: 'csv'
      };
      if(type === 'transfer') {
        txObj.fromWallet = fromWalletVal || wallet;
        if(toWallet)   txObj.toWallet  = toWallet;
        if(toAccount)  txObj.toAccount = toAccount;
        // Simpan nama dompet sebagai fallback display
        if(walletNameRaw)   txObj.walletName   = walletNameRaw;
        if(toWalletNameRaw) txObj.toWalletName = toWalletNameRaw;
      }
      return txObj;
    }).filter(Boolean);

    console.log('[FamilyFlow] Parsed', csvTx.length, 'transaksi dari CSV');

    // ── Merge: Sheets = sumber utama, local = pending queue ───────────────
    const sheetsIds = new Set(csvTx.map(t => t.id));
    const pendingLocal = S.transactions.filter(t =>
      t.source === 'local' && !sheetsIds.has(t.id)
    );
    S.transactions = [...pendingLocal, ...csvTx];
    save();

    const pendingInfo = pendingLocal.length ? ` · ${pendingLocal.length} belum terkirim` : '';
    toast(`✓ ${csvTx.length} transaksi dimuat${pendingInfo}`);

  } catch(err) {
    console.error('[FamilyFlow] Error parse CSV:', err);
    toast('⚠ Error baca data — buka console untuk detail');
  }
  renderAll();
}

// ─── Swipe support: geser halaman untuk ganti tab Semua/Suami/Istri ───
(function(){
  let _x0=null, _y0=null, _locked=null;
  const ITEMS = [{id:'all'},...ACCOUNTS];

  document.addEventListener('touchstart', e=>{
    // Hanya aktif jika ada .acc-switcher di halaman aktif
    const activePage = document.querySelector('.page.active');
    if(!activePage || !activePage.querySelector('.acc-switcher')) return;
    _x0 = e.touches[0].clientX;
    _y0 = e.touches[0].clientY;
    _locked = null;
  }, {passive:true});

  document.addEventListener('touchmove', e=>{
    if(_x0===null) return;
    const dx = e.touches[0].clientX - _x0;
    const dy = e.touches[0].clientY - _y0;
    // Tentukan arah scroll: horizontal atau vertikal
    if(_locked===null && (Math.abs(dx)>6 || Math.abs(dy)>6)){
      _locked = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
    }
    // Jika horizontal, cegah scroll vertikal
    if(_locked==='h') e.preventDefault();
  }, {passive:false});

  document.addEventListener('touchend', e=>{
    if(_x0===null || _locked!=='h'){ _x0=null; return; }
    const dx = e.changedTouches[0].clientX - _x0;
    _x0=null; _locked=null;
    if(Math.abs(dx) < 50) return;  // threshold 50px

    // Cek apakah jari mulai dari dalam .acc-switcher (scroll horizontal) — skip
    const startEl = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    if(startEl && startEl.closest('.acc-switcher')) return;

    const cur = ITEMS.findIndex(a=>a.id===S.currentAcc);
    const next = dx < 0
      ? Math.min(cur+1, ITEMS.length-1)
      : Math.max(cur-1, 0);
    if(next===cur) return;

    // Panggil fungsi switch sesuai halaman aktif
    const p = S.page;
    const fn = p==='home'?'switchHomeAcc':p==='records'?'switchRecAcc':p==='budget'?'switchBudAcc':p==='stats'?'switchStatAcc':null;
    if(fn && window[fn]) window[fn](ITEMS[next].id);
  }, {passive:true});
})();

      }
      if(S.recTime==='week') {
        const start=new Date(now); start.setDate(now.getDate()-now.getDay()); start.setHours(0,0,0,0);
        const end=new Date(start); end.setDate(start.getDate()+7);
        return d>=start && d<end;
      }
      if(S.recTime==='month') return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
      if(S.recTime==='year') return d.getFullYear()===now.getFullYear();
      return true;
    });
  }
  txs=[...txs].sort((a,b)=>{
    // Sort by timestamp jika ada, fallback ke date
    const ta = a.timestamp ? new Date(a.timestamp) : new Date(a.date);
    const tb = b.timestamp ? new Date(b.timestamp) : new Date(b.date);
    return tb - ta;
  });

  const el = document.getElementById('rec-list'); if(!el) return;
  if(!txs.length) { el.innerHTML='<div class="empty"><i class="ti ti-file-off"></i><p>Belum ada transaksi di periode ini</p></div>'; return; }

  // Kelompokkan per tanggal
  const byDate = {};
  txs.forEach(t => { if(!byDate[t.date]) byDate[t.date]=[]; byDate[t.date].push(t); });

  el.innerHTML = Object.entries(byDate)
    .sort(([a],[b]) => new Date(b)-new Date(a))
    .map(([date, dayTxs]) => {
      const dayInc = dayTxs.reduce((s,t)=>t.type==='income'?s+t.amount:s,0);
      const dayExp = dayTxs.reduce((s,t)=>t.type==='expense'?s+t.amount:s,0);
      const [dy,dm,dd] = date.split('-').map(Number);
      const dt   = new Date(dy,dm-1,dd);
      const dayName = dt.toLocaleDateString('id-ID',{weekday:'short'});
      const dayNum  = dt.getDate();
      const monthName = dt.toLocaleDateString('id-ID',{month:'short'});

      const dayItems = dayTxs.map(t => {
        const time = fmtTime(t.timestamp); // "11:26 WIB" atau null
        if(t.type==='plan_contribution') {
          const w=findWallet(t.wallet)||{name:'?'}; const acc=getAcc(t.account);
          return `<div class="tx-item" onclick="showDetail('${t.id}')">
            <div class="tx-icon" style="background:rgba(74,124,247,0.12)">
              <i class="ti ti-target-arrow" style="color:var(--accent);font-size:18px"></i>
            </div>
            <div class="tx-info">
              <div class="tx-name">${t.planName||'Rencana Keuangan'}</div>
              <div class="tx-sub">
                ${time?`<span class="tx-time"><i class="ti ti-clock" style="font-size:10px"></i>${time}</span>`:''}
                <span class="badge" style="background:${acc.color}10;color:${acc.color};border-color:${acc.color}30">${acc.label}</span>
                <span>${w.name}</span>
              </div>
            </div>
            <div class="tx-amt trf">${fmt(t.amount)}</div>
          </div>`;
        }
        if(t.type==='transfer') {
          const fw=findWallet(t.fromWallet)||{name:'?'}; const tw=findWallet(t.toWallet)||{name:'?'};
          const fa=getAcc(t.account); const ta=getAcc(t.toAccount||t.account);
          return `<div class="tx-item" onclick="showDetail('${t.id}')">
            <div class="tx-icon" style="background:rgba(139,92,246,0.12)">
              <i class="ti ti-arrows-transfer-up" style="color:var(--purple);font-size:18px"></i>
            </div>
            <div class="tx-info">
              <div class="tx-name">${t.note||'Transfer'}</div>
              <div class="tx-sub">
                ${time?`<span class="tx-time"><i class="ti ti-clock" style="font-size:10px"></i>${time}</span>`:''}
                <span class="badge badge-purple">${fa.label}→${ta.label}</span>
                <span>${fw.name}→${tw.name}</span>
              </div>
            </div>
            <div class="tx-amt trf">${fmt(t.amount)}</div>
          </div>`;
        }
        const cat=getCat(t.category); const acc=getAcc(t.account); const wallet=findWallet(t.wallet);
        return `<div class="tx-item" onclick="showDetail('${t.id}')">
          <div class="tx-icon" style="background:${cat.color}18">
            <i class="ti ${cat.icon}" style="color:${cat.color};font-size:18px"></i>
          </div>
          <div class="tx-info">
            <div class="tx-name">${t.note||cat.label}</div>
            <div class="tx-sub">
              ${time?`<span class="tx-time"><i class="ti ti-clock" style="font-size:10px"></i>${time}</span>`:''}
              <span class="badge" style="background:${acc.color}10;color:${acc.color};border-color:${acc.color}30">${acc.label}</span>
              ${wallet?`<span>${wallet.name}</span>`:''}
            </div>
          </div>
          <div class="tx-amt ${t.type==='income'?'inc':'exp'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
        </div>`;
      }).join('');

      return `
        <div style="display:flex;align-items:center;gap:10px;margin-top:6px;margin-bottom:4px">
          <div style="display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,0.65);border:1px solid rgba(255,255,255,0.85);border-radius:10px;padding:5px 10px;flex-shrink:0;min-width:48px;backdrop-filter:blur(12px)">
            <div style="font-size:18px;font-weight:800;color:var(--text);line-height:1">${dayNum}</div>
            <div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em">${dayName} ${monthName}</div>
          </div>
          <div style="flex:1;height:1px;background:rgba(0,0,0,0.07)"></div>
          <div style="font-size:11px;font-weight:600;flex-shrink:0;display:flex;gap:6px">
            ${dayInc>0?`<span style="color:var(--green)">+${fmt(dayInc)}</span>`:''}
            ${dayExp>0?`<span style="color:var(--red)">-${fmt(dayExp)}</span>`:''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:7px">${dayItems}</div>`;
    }).join('');
}

function renderTrend(cid, txs) {
  const c=document.getElementById(cid); if(!c) return;
  if(S.charts[cid]) S.charts[cid].destroy();
  const today=new Date(); const days=[];
  for(let i=29;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push(d.toISOString().split('T')[0]);}
  let base=0;
  // compute balance before window
  const beforeDate=new Date(days[0]);
  txs.filter(t=>new Date(t.date)<beforeDate).forEach(t=>{
    if(t.type==='income') base+=t.amount;
    else if(t.type==='expense') base-=t.amount;
  });
  let running=base;
  const data=days.map(day=>{
    txs.filter(t=>t.date===day).forEach(t=>{
      if(t.type==='income') running+=t.amount;
      else if(t.type==='expense') running-=t.amount;
    });
    return {x:day,y:running};
  });
  S.charts[cid]=new Chart(c,{type:'line',data:{datasets:[{data,borderColor:'#4a7cf7',backgroundColor:'rgba(74,124,247,0.07)',borderWidth:2,fill:true,tension:0.45,pointRadius:0,pointHoverRadius:4}]},options:{responsive:true,maintainAspectRatio:false,parsing:{xAxisKey:'x',yAxisKey:'y'},scales:{x:{grid:{display:false},ticks:{color:'#9aa0b8',maxTicksLimit:5,font:{size:9}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{color:'#9aa0b8',font:{size:9},callback:v=>fmt(v)}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmtFull(ctx.parsed.y)}}}}});
}

function deleteTx(id) {
  // Konfirmasi sebelum hapus
  const t = S.transactions.find(x => x.id === id);
  if(!t) return;
  const label = t.note || t.category || 'transaksi ini';
  if(!confirm(`Hapus "${label}" (${fmtFull(t.amount)})?\n\nData akan dihapus dari spreadsheet.`)) return;

  // Hapus dari state lokal
  S.transactions = S.transactions.filter(x => x.id !== id);
  save();
  closeModal('m-detail');
  toast('Menghapus transaksi...');
  renderAll();

  // Hapus dari Sheets via Apps Script
  deleteFromSheets(id);
}

async function deleteFromSheets(id) {
  if(!APPS_SCRIPT_URL) return;
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'deleteTx', id })
    });
    // Setelah hapus, sync ulang untuk konfirmasi
    setTimeout(() => loadCSV(), 2000);
  } catch(e) {
    toast('⚠ Gagal hapus dari Sheets');
  }
}

function openAdd(editId) {
  S.editId = editId || null;
  buildCatGrid(); buildAccSelect(); buildFromWallet();
  document.getElementById('inp-date').value=localDateStr();
  // Reset & init formatter untuk input amount
  const amtEl = document.getElementById('inp-amount');
  amtEl.value=''; amtEl.dataset.raw='0';
  document.getElementById('inp-note').value='';
  setTxType('expense');

  if(S.editId) {
    const t = S.transactions.find(x=>x.id===S.editId);
    if(t) {
      document.getElementById('m-add-title').textContent='Edit Transaksi';
      setTxType(t.type);
      setRupiahInput('inp-amount', t.amount);
      document.getElementById('inp-note').value = t.note||'';
      document.getElementById('inp-date').value = t.date||localDateStr();

      if(t.type==='transfer') {
        const fromAcc = t.account || 'suami';
        const toAcc   = t.toAccount || 'suami';
        document.getElementById('inp-account').value = fromAcc;
        buildFromWallet();
        document.getElementById('inp-from-wallet').value = t.fromWallet || t.wallet || '';
        document.getElementById('inp-to-account').value = toAcc;
        buildToWallet();
        document.getElementById('inp-to-wallet').value = t.toWallet || '';
      } else {
        S.selCat = t.category || 'other';
        buildCatGrid();
        document.getElementById('inp-account').value = t.account || 'suami';
        buildFromWallet();
        document.getElementById('inp-from-wallet').value = t.wallet || '';
      }
    }
  } else {
    document.getElementById('m-add-title').textContent='Tambah Transaksi';
  }

  document.getElementById('m-add').classList.add('open');
  // Aktifkan formatter setelah modal terbuka
  setTimeout(()=>initRupiahInput('inp-amount'), 50);
}
function setTxType(t) {
  S.txType=t;
  ['expense','income','transfer'].forEach(x=>{
    const b=document.getElementById('tbtn-'+x);
    if(!b) return;
    // Reset semua class dulu
    b.classList.remove('t-exp','t-inc','t-trf');
    // Beri class aktif hanya pada yang dipilih
    if(x===t){
      if(x==='expense') b.classList.add('t-exp');
      else if(x==='income') b.classList.add('t-inc');
      else if(x==='transfer') b.classList.add('t-trf');
    }
  });
  const isTrf=t==='transfer';
  document.getElementById('fg-cat').style.display=isTrf?'none':'';
  document.getElementById('fg-account').style.display='';
  document.getElementById('fg-from-wallet').style.display='';
  document.getElementById('trf-fields').style.display=isTrf?'':'none';
  document.getElementById('lbl-from-wallet').textContent=isTrf?'Dari Dompet':(t==='income'?'Ke Dompet':'Dari Dompet');
  if(isTrf) buildToAccSelect();
}
function buildCatGrid() {
  document.getElementById('cat-grid').innerHTML=CATEGORIES.map(c=>`

      <i class="ti ${c.icon}" style="color:${c.color}"></i>

function selCat(id, el) {

}
function buildAccSelect() {

}
function onToAccChange() { buildToWallet(); }

function saveTx() {
  const amtEl = document.getElementById('inp-amount');
  const amount = rupiahVal(amtEl);
  if(!amount||amount<=0){ toast('Masukkan jumlah yang valid'); return; }
  const date=document.getElementById('inp-date').value||localDateStr();
  const note=document.getElementById('inp-note').value;
  let tx;
  const isEdit = !!S.editId;
  const oldTx = isEdit ? S.transactions.find(x=>x.id===S.editId) : null;

  if(S.txType==='transfer'){
    const fromW=document.getElementById('inp-from-wallet')?.value;
    const toW=document.getElementById('inp-to-wallet')?.value;
    const fromAcc=document.getElementById('inp-account')?.value||'suami';
    const toAcc=document.getElementById('inp-to-account')?.value||'suami';
    if(!fromW||!toW){ toast('Pilih dompet asal dan tujuan'); return; }
    if(fromW===toW){ toast('Dompet asal dan tujuan tidak boleh sama'); return; }
    const fromWName = findWallet(fromW)?.name || '';
    const toWName   = findWallet(toW)?.name   || '';
    tx={id: isEdit?S.editId:uid(), date, amount, type:'transfer', account:fromAcc, toAccount:toAcc,
        wallet:fromW, fromWallet:fromW, toWallet:toW,
        walletName:fromWName, toWalletName:toWName,
        note:note||'Transfer', source: isEdit?(oldTx?.source||'local'):'local',
        timestamp: isEdit?(oldTx?.timestamp||new Date().toISOString()):new Date().toISOString()};
  } else {
    const acc=document.getElementById('inp-account')?.value||'suami';
    const wallet=document.getElementById('inp-from-wallet')?.value||'';
    tx={id: isEdit?S.editId:uid(), date, amount, type:S.txType, category:S.selCat, account:acc, wallet, note,
        source: isEdit?(oldTx?.source||'local'):'local',
        timestamp: isEdit?(oldTx?.timestamp||new Date().toISOString()):new Date().toISOString()};
  }

  if(isEdit) {
    const idx = S.transactions.findIndex(x=>x.id===S.editId);
    if(idx>-1) S.transactions[idx]=tx; else S.transactions.unshift(tx);
  } else {
    S.transactions.unshift(tx);
  }
  save();
  // Kirim ke Google Sheets
  if(isEdit) syncToSheets({...tx, action:'updateTx'});
  else syncToSheets(tx);
  closeModal('m-add');
  S.editId = null;
  toast(isEdit?'Transaksi berhasil diperbarui ✓':'Transaksi berhasil disimpan ✓');
  renderAll();
}

async function syncToSheets(tx) {
  if(!APPS_SCRIPT_URL) return;
  try {
    // Pastikan field wallet selalu terisi untuk transfer (wallet = fromWallet)
    const payload = { action:'saveTx', ...tx };
    if(tx.type === 'transfer') {
      payload.wallet    = tx.fromWallet || tx.wallet || '';
      payload.toWallet  = tx.toWallet   || '';
      payload.toAccount = tx.toAccount  || '';
    }
    await fetch(APPS_SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    // Push konfigurasi dompet & budget + saldo terkini supaya sinkron antar perangkat
    await pushConfig();
  } catch(e){
    toast('⚠ Gagal kirim ke Sheets, tersimpan lokal');
  }
}

        ${PLAN_ICONS.map((ic,i)=>`<div onclick="selPlanIcon('${ic}',this)" data-ic="${ic}" style="width:40px;height:40px;border-radius:12px;background:${i===0?'rgba(74,124,247,0.15)':'rgba(255,255,255,0.6)'};border:1.5px solid ${i===0?'var(--accent)':'transparent'};display:flex;align-items:center;justify-content:center;cursor:pointer"><i class="ti ${ic}" style="color:var(--accent);font-size:18px"></i></div>`).join('')}
      </div>
    </div>
    <button class="submit-btn" onclick="savePlan()">Simpan Rencana</button>`;
  S.selPlanIcon = PLAN_ICONS[0];
  document.getElementById('m-detail').classList.add('open');
  setTimeout(()=>initRupiahInput('plan-target'), 50);
}
function selPlanIcon(ic, el) {
  S.selPlanIcon = ic;
  document.querySelectorAll('#plan-icons div').forEach(e=>{ e.style.background='rgba(255,255,255,0.6)'; e.style.border='1.5px solid transparent'; });
  el.style.background='rgba(74,124,247,0.15)';
  el.style.border='1.5px solid var(--accent)';
}
function savePlan() {
  const name=document.getElementById('plan-name').value.trim();
  const targetEl=document.getElementById('plan-target');
  const target=rupiahVal(targetEl);
  if(!name){ toast('Masukkan nama program'); return; }
  if(!target||target<=0){ toast('Masukkan target biaya yang valid'); return; }
  S.plans.push({
    id:'plan_'+uid(), name, target,
    icon: S.selPlanIcon||PLAN_ICONS[0],
    color: WALLET_COLORS[S.plans.length % WALLET_COLORS.length],
    createdAt: new Date().toISOString()
  });
  save();
  closeModal('m-detail');
  toast('Rencana keuangan dibuat ✓');
  renderBudget();
}

function openPlanContribute(planId) {
  const plan=findPlan(planId); if(!plan) return;
  document.getElementById('detail-body').innerHTML=`
    <span class="modal-handle"></span>
    <h2 class="modal-title">Tambah Dana</h2>
    <p style="font-size:13px;color:var(--text2);margin-top:-12px;margin-bottom:16px">Transfer dana dari dompet ke program "<b>${plan.name}</b>"</p>
    <div class="fg">
      <label class="fl">Jumlah (Rp)</label>
      <input class="fi" type="text" inputmode="numeric" id="plan-contrib-amount" placeholder="0">
    </div>
    <div class="fg">
      <label class="fl">Dari Akun</label>
      <select class="fs" id="plan-contrib-account" onchange="buildPlanContribWallet()"></select>
    </div>
    <div class="fg">
      <label class="fl">Dari Dompet</label>
      <select class="fs" id="plan-contrib-wallet"></select>
    </div>
    <div class="fg">
      <label class="fl">Tanggal</label>
      <input class="fi" type="date" id="plan-contrib-date">
    </div>
    <button class="submit-btn" onclick="savePlanContribute('${planId}')">Simpan</button>`;
  document.getElementById('plan-contrib-account').innerHTML=ACCOUNTS.map(a=>`<option value="${a.id}">${a.label}</option>`).join('');
  document.getElementById('plan-contrib-date').value=localDateStr();
  buildPlanContribWallet();
  document.getElementById('m-detail').classList.add('open');
  setTimeout(()=>initRupiahInput('plan-contrib-amount'), 50);
}
function buildPlanContribWallet() {
  const accId=document.getElementById('plan-contrib-account')?.value||'suami';
  const sel=document.getElementById('plan-contrib-wallet');
  if(!sel) return;
  const ws=getWallets(accId);
  sel.innerHTML=ws.length?ws.map(w=>`<option value="${w.id}">${w.name} (${fmtFull(walletBalance(w.id))})</option>`).join(''):'<option value="">Tidak ada dompet</option>';
}
function savePlanContribute(planId) {
  const plan=findPlan(planId); if(!plan) return;
  const amtEl=document.getElementById('plan-contrib-amount');
  const amount=rupiahVal(amtEl);
  if(!amount||amount<=0){ toast('Masukkan jumlah yang valid'); return; }
  const acc=document.getElementById('plan-contrib-account').value;
  const wallet=document.getElementById('plan-contrib-wallet').value;
  if(!wallet){ toast('Pilih dompet sumber dana'); return; }
  const date=document.getElementById('plan-contrib-date').value||localDateStr();
  const tx={
    id:uid(), date, amount, type:'plan_contribution',
    account:acc, wallet, planId, planName:plan.name,
    note:`Tambah dana: ${plan.name}`, source:'local', timestamp:new Date().toISOString()
  };
  S.transactions.unshift(tx);
  save();
  syncToSheets(tx);
  closeModal('m-detail');
  toast('Dana berhasil ditambahkan ✓');
  renderBudget();
  renderHome();
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function closeModal(id, e) {
  if(!e||e.target===document.getElementById(id))
    document.getElementById(id).classList.remove('open');
}
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show';
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast',2600);
}
function doSync() { loadCSV(); }

// Auto-refresh setiap 60 detik agar data selalu sinkron antar perangkat
let _autoSyncTimer = null;
function startAutoSync() {
  if(_autoSyncTimer) clearInterval(_autoSyncTimer);
  _autoSyncTimer = setInterval(()=>{
    // Hanya sync jika tab aktif (tidak buang kuota saat background)
    if(!document.hidden) loadCSV();
  }, 60000);
}
// Sync juga saat tab kembali aktif (pindah dari tab lain / kembali dari sleep)
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden) loadCSV();
});

// ═══════════════════════════════════════════════
//  PIN SYSTEM
// ═══════════════════════════════════════════════
const PIN_KEY      = 'ff_pin';
const PIN_SESS_KEY = 'ff_pin_sess';
let _pinBuf        = '';
let _pinMode       = 'unlock'; // 'unlock' | 'setup1' | 'setup2'
let _pinSetupFirst = '';

function pinGetStored() { return localStorage.getItem(PIN_KEY) || ''; }
function pinSetStored(p) { localStorage.setItem(PIN_KEY, p); }

function pinInit() {
  const stored = pinGetStored();
  // Jika sudah unlock di sesi ini, langsung masuk
  if(sessionStorage.getItem(PIN_SESS_KEY) === '1' && stored) {
    document.getElementById('pin-screen').style.display = 'none';
    return;
  }
  if(!stored) {
    // Coba ambil PIN dari server dulu (mungkin sudah diset di browser/perangkat lain)
    _pinMode = 'checking';
    document.getElementById('pin-subtitle').textContent = 'Memeriksa PIN...';
    pullPin().then(remotePin => {
      if(remotePin) {
        pinSetStored(remotePin);
        _pinMode = 'unlock';
        document.getElementById('pin-subtitle').textContent = 'Masukkan PIN untuk melanjutkan';
        document.getElementById('pin-setup-hint').textContent = '';
      } else {
        _pinMode = 'setup1';
        document.getElementById('pin-subtitle').textContent = 'Buat PIN baru (4 digit)';
        document.getElementById('pin-setup-hint').textContent = 'PIN digunakan untuk melindungi data keuangan keluarga kamu.';
      }
    });
  } else {
    _pinMode = 'unlock';
    document.getElementById('pin-subtitle').textContent = 'Masukkan PIN untuk melanjutkan';
  }
}

// ─── Sync PIN ke/dari Apps Script ───
async function pushPin(pin) {
  if(!APPS_SCRIPT_URL) return;
  try {
    await fetch(APPS_SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'savePin', pin })
    });
  } catch(e){}
}

async function pullPin() {
  if(!APPS_SCRIPT_URL) return null;
  const proxies = [
    `${APPS_SCRIPT_URL}?action=getPin`,
    `https://corsproxy.io/?${encodeURIComponent(APPS_SCRIPT_URL+'?action=getPin')}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(APPS_SCRIPT_URL+'?action=getPin')}`,
  ];
  for(const url of proxies){
    try {
      const res = await fetch(url, {signal:AbortSignal.timeout(5000)});
      if(!res.ok) continue;
      const data = await res.json();
      if(data && data.pin) return data.pin;
    } catch(e){}
  }
  return null;
}

function pinKey(digit) {
  if(_pinMode === 'checking') return;
  if(_pinBuf.length >= 4) return;
  _pinBuf += digit;
  pinRenderDots();
  if(_pinBuf.length === 4) {
    setTimeout(pinSubmit, 160);
  }
}

function pinDel() {
  if(!_pinBuf.length) return;
  _pinBuf = _pinBuf.slice(0, -1);
  pinRenderDots();
  document.getElementById('pin-error').textContent = '';
}

function pinRenderDots() {
  for(let i=0;i<4;i++) {
    const d = document.getElementById('pd'+i);
    d.classList.toggle('filled', i < _pinBuf.length);
  }
}

function pinShakeAll() {
  for(let i=0;i<4;i++) {
    const d = document.getElementById('pd'+i);
    d.classList.remove('shake');
    void d.offsetWidth; // reflow
    d.classList.add('shake');
  }
}

function pinSubmit() {
  const entered = _pinBuf;
  _pinBuf = '';
  pinRenderDots();

  if(_pinMode === 'unlock') {
    if(entered === pinGetStored()) {
      sessionStorage.setItem(PIN_SESS_KEY, '1');
      const scr = document.getElementById('pin-screen');
      scr.style.transition = 'opacity .25s';
      scr.style.opacity = '0';
      setTimeout(() => { scr.style.display = 'none'; scr.style.opacity = ''; scr.style.transition = ''; }, 250);
    } else {
      pinShakeAll();
      document.getElementById('pin-error').textContent = 'PIN salah, coba lagi';
    }

  } else if(_pinMode === 'setup1') {
    _pinSetupFirst = entered;
    _pinMode = 'setup2';
    document.getElementById('pin-subtitle').textContent = 'Konfirmasi PIN kamu';
    document.getElementById('pin-setup-hint').textContent = '';
    document.getElementById('pin-error').textContent = '';

  } else if(_pinMode === 'setup2') {
    if(entered === _pinSetupFirst) {
      pinSetStored(entered);
      pushPin(entered);
      sessionStorage.setItem(PIN_SESS_KEY, '1');
      const scr = document.getElementById('pin-screen');
      scr.style.transition = 'opacity .25s';
      scr.style.opacity = '0';
      setTimeout(() => { scr.style.display = 'none'; scr.style.opacity = ''; scr.style.transition = ''; }, 250);
      toast('PIN berhasil dibuat ✓');
    } else {
      _pinMode = 'setup1';
      _pinSetupFirst = '';
      pinShakeAll();
      document.getElementById('pin-error').textContent = 'PIN tidak cocok, ulangi dari awal';
      setTimeout(() => {
        document.getElementById('pin-subtitle').textContent = 'Buat PIN baru (4 digit)';
        document.getElementById('pin-setup-hint').textContent = 'PIN digunakan untuk melindungi data keuangan keluarga kamu.';
        document.getElementById('pin-error').textContent = '';
      }, 1200);
    }
  }
}

// Ganti PIN — bisa dipanggil dari Settings atau header
function openChangePIN() {
  _pinBuf = '';
  _pinMode = 'setup1';
  _pinSetupFirst = '';
  pinRenderDots();
  document.getElementById('pin-subtitle').textContent = 'Buat PIN baru (4 digit)';
  document.getElementById('pin-setup-hint').textContent = '';
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-screen').style.display = 'flex';
  sessionStorage.removeItem(PIN_SESS_KEY);
}

// ─── Keyboard support for PIN ───
document.addEventListener('keydown', e => {
  if(document.getElementById('pin-screen').style.display === 'none') return;
  if(e.key >= '0' && e.key <= '9') pinKey(e.key);
  else if(e.key === 'Backspace') pinDel();
});


function boot() {
  pinInit();
  const pages = {
    'page-home':'home-content','page-records':'records-content',
    'page-budget':'budget-content','page-stats':'stats-content','page-wallet':'wallet-content'
  };
  Object.entries(pages).forEach(([pid,cid])=>{
    const pg=document.getElementById(pid);
    if(pg&&!document.getElementById(cid)) pg.innerHTML=`<div id="${cid}"></div>`;
  });
  load();
  // Bersihkan data lama sumber demo jika ada
  S.transactions = S.transactions.filter(t => t.source !== 'demo');
  save();
  S.page='home';
  document.getElementById('page-home').classList.add('active');
  document.getElementById('nav-home').classList.add('active');
  renderHome();
  setTimeout(()=>loadCSV(), 900);
  startAutoSync();
}
document.addEventListener('DOMContentLoaded', boot);
</script>
